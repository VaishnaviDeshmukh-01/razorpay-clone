<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Razorpay Clone</title>
  </head>
  <body>
    <header>
      <nav class="navbar" aria-label="Main navigation">
        <!-- Logo -->
        <div class="logo">
          <a href="/" aria-label="Razorpay Home">
            <img src="assets/Razorpay_logo.svg" alt="Razorpay Logo" />
          </a>
        </div>

        <!-- Navigation Links -->
        <ul class="nav-links" role="menubar">
          <li role="none">
            <a href="#" role="menuitem">Agentic Stack</a>
          </li>
          <li role="none">
            <a href="#" role="menuitem">Payments</a>
          </li>
          <li role="none">
            <a href="#" role="menuitem">Banking+</a>
          </li>
          <li role="none">
            <a href="#" role="menuitem">Payroll</a>
          </li>
          <li role="none">
            <a href="#" role="menuitem">Engage</a>
          </li>
          <li role="none">
            <a href="#" role="menuitem">Partners</a>
          </li>
          <li role="none">
            <a href="#" role="menuitem">Resources</a>
          </li>
          <li role="none">
            <a href="#" role="menuitem">Pricing</a>
          </li>
        </ul>

        <!-- Right Actions -->
        <div class="nav-actions">
          <!-- Support -->
          <div class="support-icon" aria-label="Contact Support">
            <img src="assets/headphone.svg" alt="Support" />
          </div>

          <!-- Region Selector -->
          <div class="region-selector" aria-label="Select region">
            <img src="assets/Flag_of_India.svg.webp" alt="India Flag" />
            <img src="assets/down-arrow.png" alt="Dropdown arrow" />
          </div>

          <!-- Buttons -->
          <button class="btn btn-login" aria-label="Login to your account">
            Login
          </button>
          <button class="btn btn-signup" aria-label="Sign up for free">
            Sign Up →
          </button>
        </div>
      </nav>
    </header>
  </body>
</html>
